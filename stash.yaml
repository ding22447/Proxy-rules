rules:
  # ==================== 测试站专项分流 ====================
  - DOMAIN-KEYWORD,browserleaks,Proxy
  - DOMAIN-KEYWORD,dnsleak,Proxy
  - DOMAIN-KEYWORD,ipleak,Proxy
  - DOMAIN-KEYWORD,whoer,Proxy
  - DOMAIN-SUFFIX,ipinfo.io,Proxy
  - DOMAIN-SUFFIX,ip.sb,Proxy
  - DOMAIN-SUFFIX,ifconfig.me,Proxy

  # ==================== 自定义强制代理 ====================
  - DOMAIN,v2rayse.com,Proxy

  # ==================== 本地 / 私有 / 局域网直连 ====================
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve

  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve

  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - GEOIP,LAN,DIRECT,no-resolve

  # ==================== GitHub 手动优先规则 ====================
  - DOMAIN-SUFFIX,github.com,GitHub
  - DOMAIN-SUFFIX,github.io,GitHub
  - DOMAIN-SUFFIX,github.dev,GitHub
  - DOMAIN-SUFFIX,githubusercontent.com,GitHub
  - DOMAIN-SUFFIX,githubassets.com,GitHub

  # ==================== AI：放在 Google / Microsoft / proxy 前面 ====================
  - RULE-SET,OpenAI,AI
  - RULE-SET,Claude,AI
  - RULE-SET,Gemini,AI
  - RULE-SET,Copilot,AI

  # ==================== 精细化国外服务 ====================
  - RULE-SET,GitHub,GitHub
  - RULE-SET,telegramcidr,Telegram,no-resolve

  - RULE-SET,YouTube,YouTube
  - RULE-SET,Netflix,Netflix
  - RULE-SET,Bahamut,Bahamut
  - RULE-SET,Spotify,Spotify
  - RULE-SET,TikTok,TikTok

  # ==================== Google / Microsoft / Apple ====================
  - RULE-SET,Google,Google
  - RULE-SET,Microsoft,Microsoft
  - RULE-SET,icloud,Apple
  - RULE-SET,apple,Apple

  # ==================== 国内 / 混合服务 ====================
  - RULE-SET,Bilibili,Bilibili

  # ==================== 国外 / GFW ====================
  - RULE-SET,proxy,Proxy
  - RULE-SET,gfw,Proxy

  # ==================== 国内直连：放在国外规则后面，避免国外域名被提前直连 ====================
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # ==================== 兜底 ====================
  - MATCH,Final

