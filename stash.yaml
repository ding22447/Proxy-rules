# ==================== [ Stash - GitHub 订阅版 / 可视化机场 ] ====================
# 说明：
# 1. 配置文件不保存机场订阅链接。
# 2. 不用 Override，不用 #!replace。
# 3. 不加国家组，不加 Auto，不加 Manual。
# 4. 不创建 Direct 分组，直连统一使用系统内置 DIRECT。
# 5. 机场订阅由 Stash 可视化界面添加和管理。
# 6. 各策略组使用 include-all 自动收集界面机场节点。
# 7. 国内服务：DIRECT / Proxy / 机场节点...
# 8. 这版重点修正：
#    - 国外服务 / proxy / gfw 放在国内 direct / GEOIP CN 前面
#    - DNS 使用 redir-host，先避免 fake-ip 缓存/兼容问题
#    - store-selected 先关闭，避免旧策略选择缓存影响

mode: rule
log-level: warning
ipv6: false
allow-lan: false
mixed-port: 7890

profile:
  store-selected: false

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - system

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - '+.google.com'
      - '+.youtube.com'
      - '+.github.com'
      - '+.githubusercontent.com'
      - '+.telegram.org'
      - '+.telegram.me'
      - '+.openai.com'
      - '+.chatgpt.com'
      - '+.anthropic.com'
      - '+.claude.ai'
      - '+.gemini.google.com'
      - '+.facebook.com'
      - '+.twitter.com'
      - '+.x.com'
      - '+.instagram.com'
      - '+.netflix.com'
      - '+.spotify.com'
      - '+.tiktok.com'

# ==================== 多机场订阅，只在这里填写订阅链接 ====================
proxy-groups:
  # ==================== 主代理组 ====================
  # 主 Proxy 只负责显示所有机场节点，不放 DIRECT，避免国外默认直连。
  - name: Proxy
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: select
    include-all: true

  # ==================== 国外服务：Proxy / DIRECT / 多机场节点 ====================
  - name: GitHub
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/GitHub.png
    type: select
    proxies:
      - Proxy
      - DIRECT
    include-all: true

  - name: Google
